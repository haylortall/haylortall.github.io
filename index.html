<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taylor</title>

  <!-- wassup homie - why you creepin? -->
  <meta property="og:title" content="Taylor" />
  <meta property="og:image" content="https://haylortall.github.io/preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://haylortall.github.io/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://haylortall.github.io/preview.png" />

  <style>
    :root {
      --bg: #000000;
      --card: #050505;
      --line: rgba(255,255,255,0.12);
      --line-hover: rgba(255,255,255,0.22);
      --text: #f5f1ec;
      --muted: rgba(245,241,236,0.8);
      --shadow: 0 10px 24px rgba(0,0,0,0.24);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 34px 20px 40px;
    }

    .wrap {
      width: min(720px, 100%);
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 10px 6px 28px;
    }

    .heart {
      font-size: clamp(40px, 5vw, 58px);
      line-height: 1;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      transform: translateY(-1px);
    }

    .name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(48px, 8vw, 74px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .links {
      display: grid;
      gap: 20px;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      padding: 18px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .link-card:hover {
      transform: translateY(-1px);
      border-color: var(--line-hover);
      background: #080808;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .emoji {
      font-size: 20px;
      line-height: 1;
      transform: translateY(1px);
    }

    .burst {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      animation: float 1.4s cubic-bezier(.19,1,.22,1) forwards;
    }

    @keyframes float {
      0% {
        opacity: 0;
        transform: translate(-50%,-50%) scale(0.6);
      }
      15% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform:
          translate(calc(-50% + var(--dx)), calc(-50% + var(--dy)))
          scale(1.2)
          rotate(var(--rot));
      }
    }

    @media (max-width: 560px) {
      body { padding: 24px 14px 28px; }
      .header { gap: 12px; margin-bottom: 22px; }
      .links { gap: 14px; }
      .link-card { min-height: 58px; font-size: 17px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div class="heart">♡</div>
      <div class="name">Taylor</div>
    </header>

    <section class="links">
      <a class="link-card" href="javascript:void(0)" onclick="go(event,'./hi/','👋 ✨ 🤍')">
        <span class="label"><span class="emoji">👋</span><span>Hi</span></span>
      </a>

      <a class="link-card" href="javascript:void(0)" onclick="go(event,'./goat/','🐐 ⚡ ⭐')">
        <span class="label"><span class="emoji">🐐</span><span>Goat</span></span>
      </a>

      <a class="link-card" href="javascript:void(0)" onclick="go(event,'./jersey/','🏈 ⭐ ✨')">
        <span class="label"><span class="emoji">🏈</span><span>Jersey</span></span>
      </a>

      <a class="link-card" href="javascript:void(0)" onclick="go(event,'./potato/','🥔 🍟 ✨')">
        <span class="label"><span class="emoji">🥔</span><span>Potato</span></span>
      </a>

       <a class="link-card" href="javascript:void(0)" onclick="go(event,'./keeptapping/','👆 💥 ⚡')">
        <span class="label"><span class="emoji">☝️</span><span>Keep Tapping</span></span>
      </a>

       <a class="link-card" href="javascript:void(0)" onclick="go(event,'./star/','⭐ ✨ 💫')">
        <span class="label"><span class="emoji">⭐</span><span>Star</span></span>
      </a>

      <a class="link-card" href="javascript:void(0)" onclick="go(event,'./draw/','✏️ 🌀 ✨')">
        <span class="label"><span class="emoji">✏️</span><span>Draw</span></span>
      </a>

      <a class="link-card" href="javascript:void(0)" onclick="go(event,'./static/','📺 ░ ⚡')">
        <span class="label"><span class="emoji">📺</span><span>Static</span></span>
      </a>
      
      <a class="link-card" href="javascript:void(0)" onclick="go(event,'./signal/','📡 👆 ⚡')">
        <span class="label"><span class="emoji">📡</span><span>Signal</span></span>
      </a>

      <a class="link-card" href="javascript:void(0)" onclick="go(event,'./match/','🎯 ✨ ●')">
        <span class="label"><span class="emoji">🎯</span><span>Match</span></span>
      </a>
    </section>
  </main>

  <script>
    function go(e, url, emojiString) {
      const emojis = emojiString.split(" ");

      for (let i = 0; i < 10; i++) {
        let el = document.createElement("div");
        el.className = "burst";
        el.innerText = emojis[i % emojis.length];

        el.style.left = e.clientX + "px";
        el.style.top = e.clientY + "px";

        el.style.setProperty("--dx", (Math.random() * 220 - 110) + "px");
        el.style.setProperty("--dy", (-100 - Math.random() * 150) + "px");
        el.style.setProperty("--rot", (Math.random() * 120 - 60) + "deg");

        el.style.fontSize = (20 + Math.random() * 18) + "px";

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1400);
      }

      setTimeout(() => {
        window.location = url;
      }, 400);
    }
  </script>
</body>
</html>
