<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taylor</title>

  <!-- Link Preview (iMessage, etc) -->
  <meta property="og:title" content="Taylor" />
  <meta property="og:image" content="https://haylortall.github.io/preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourdomain.com/" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://haylortall.github.io/preview.png" />

  <style>
    :root {
      --bg: #000000;
      --card: #050505;
      --line: rgba(255,255,255,0.12);
      --line-hover: rgba(255,255,255,0.22);
      --text: #f5f1ec;
      --shadow: 0 10px 24px rgba(0,0,0,0.24);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      padding: 34px 20px 40px;
    }

    .wrap {
      width: min(720px, 100%);
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 10px 6px 28px;
    }

    .heart {
      font-size: clamp(40px, 5vw, 58px);
      font-family: Georgia, serif;
    }

    .name {
      font-family: Georgia, serif;
      font-size: clamp(48px, 8vw, 74px);
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .links {
      display: grid;
      gap: 20px;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      padding: 18px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      transition: 0.2s ease;
      box-shadow: var(--shadow);
    }

    .link-card:hover {
      transform: translateY(-1px);
      border-color: var(--line-hover);
      background: #080808;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .emoji {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div class="heart">♡</div>
      <div class="name">Taylor</div>
    </header>

    <section class="links">
      <a class="link-card" href="./hi/">
        <span class="label"><span class="emoji">👋</span>Hi</span>
      </a>

      <a class="link-card" href="./goat/">
        <span class="label"><span class="emoji">🐐</span>Goat</span>
      </a>

      <a class="link-card" href="./jersey/">
        <span class="label"><span class="emoji">🏈</span>Jersey</span>
      </a>

      <a class="link-card" href="./potato/">
        <span class="label"><span class="emoji">🥔</span>Potato</span>
      </a>

      <a class="link-card" href="./keep-tapping/">
        <span class="label"><span class="emoji">☝️</span>Keep Tapping</span>
      </a>

      <a class="link-card" href="./star/">
        <span class="label"><span class="emoji">⭐</span>Star</span>
      </a>
    </section>
  </main>
</body>
</html>
